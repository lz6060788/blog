services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog
    # ports:
    #   - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    
    # 2. 加入 Traefik 所在的网络
    networks:
      - traefik-net

    # 3. 添加 Traefik 路由标签
    labels:
      - "traefik.enable=true"
      # 设置你的子域名
      - "traefik.http.routers.myblog.rule=Host(`blog.theirises.cn`)"
      # 指定入口点为 HTTPS
      - "traefik.http.routers.myblog.entrypoints=websecure"
      # 使用我们之前配置的证书解析器
      - "traefik.http.routers.myblog.tls.certresolver=sslresolver"
      # 显式指定容器内部端口（对应你 Dockerfile 中的 EXPOSE 3000）
      - "traefik.http.services.myblog.loadbalancer.server.port=3000"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 引用外部预创建的网络
networks:
  traefik-net:
    external: true